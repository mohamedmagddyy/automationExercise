# Automation Exercise - Configuration Properties

# Browser Configuration (chrome/edge)
browser=chrome

# Base URL
base.url=https://automationexercise.com/

# Explicit Wait Timeout (in seconds)
explicit.wait.timeout=10

# Headless Mode (true/false)
headless.mode=false

# Screenshot on Failure (true/false)
screenshot.on.failure=true

# Extent Report Path
report.path=test-output/ExtentReport.html
